<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1035"/>
      <stop offset="100%" stop-color="#0d0a1a"/>
    </linearGradient>
    <linearGradient id="ac" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e8784e"/>
      <stop offset="100%" stop-color="#f4a261"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <rect x="16" y="16" width="480" height="480" rx="80" fill="none" stroke="#2a1f4e" stroke-width="4"/>
  <!-- Hexagon -->
  <polygon points="256,100 356,158 356,274 256,332 156,274 156,158" fill="none" stroke="url(#ac)" stroke-width="8" stroke-linejoin="round"/>
  <!-- V letter -->
  <text x="256" y="290" text-anchor="middle" font-family="sans-serif" font-weight="900" font-size="180" fill="url(#ac)">V</text>
  <!-- Bottom text -->
  <text x="256" y="410" text-anchor="middle" font-family="sans-serif" font-weight="700" font-size="48" fill="#38bfc2" letter-spacing="8">TRACKER</text>
</svg>
