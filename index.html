<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:#0a0e1a;color:#e2e8f0;font-family:system-ui,-apple-system,sans-serif;height:100vh;height:100dvh;display:flex;flex-direction:column;max-width:480px;margin:0 auto;overflow:hidden;overscroll-behavior:none}
button{font-family:inherit;cursor:pointer;-webkit-user-select:none}
a{-webkit-user-select:none}
.hdr{display:flex;align-items:center;padding:10px 14px;border-bottom:1px solid #2a3454;background:#111827;padding-top:max(10px,env(safe-area-inset-top));flex-shrink:0}
.title{flex:1}.title h1{font-size:1rem;font-weight:700;color:#f59e0b;margin:0}.title small{font-size:.72rem;color:#94a3b8}
.sts{font-size:.7rem;text-align:right;color:#94a3b8;line-height:1.4}
.ct{flex:1;overflow-y:auto;padding:14px;-webkit-overflow-scrolling:touch}
.c{background:#111827;border:1px solid #2a3454;border-radius:10px;padding:14px;margin-bottom:12px}
.bar{display:flex;gap:3px;margin-bottom:10px}.pip{flex:1;height:4px;border-radius:2px;background:#2a3454}.pip.on{background:#f59e0b}
.nr{display:flex;gap:8px;margin-top:2px}
.bp{flex:1;padding:11px;border-radius:8px;border:1px solid #2a3454;background:#111827;color:#e2e8f0;font-size:.84rem}
.bp:disabled{color:#2a3454}
.bn{flex:2;padding:11px;border-radius:8px;border:none;background:#f59e0b;color:#000;font-size:.88rem;font-weight:700}
.br{width:100%;margin-top:8px;padding:10px;border-radius:8px;border:1px solid #2a3454;background:#1a2236;color:#3b82f6;font-size:.82rem}
.ctr{display:flex;align-items:center;justify-content:space-between;padding:6px 0;border-bottom:1px solid #2a3454}
.ctr span{font-size:.82rem}
.cb{width:34px;height:34px;border-radius:8px;border:1px solid #2a3454;background:#1a2236;color:#e2e8f0;font-size:1.15rem;display:flex;align-items:center;justify-content:center}
.cv{display:inline-block;width:30px;text-align:center;font-weight:700;font-size:.95rem}
.tabs{display:flex;border-top:1px solid #2a3454;background:#111827;flex-shrink:0;padding-bottom:max(4px,env(safe-area-inset-bottom))}
.tab{flex:1;padding:10px 2px;text-align:center;font-size:.74rem;background:none;border:none;border-top:2px solid transparent;color:#94a3b8}
.tab.on{color:#f59e0b;font-weight:700;border-top-color:#f59e0b}
.mbg{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.88);z-index:200;display:none;align-items:center;justify-content:center;padding:20px}
.mdl{background:#111827;border:1px solid #f59e0b;border-radius:12px;padding:20px;max-width:400px;max-height:80vh;overflow-y:auto;width:100%}
.mnu{background:#111827;border-bottom:1px solid #2a3454;padding:14px;position:fixed;top:0;left:0;right:0;z-index:99;max-width:480px;margin:0 auto;display:none;padding-top:max(14px,env(safe-area-inset-top))}
.mnu a{display:block;padding:7px 0;color:#3b82f6;font-size:.84rem;text-decoration:none}
.svb{display:flex;gap:6px;margin-bottom:8px}
.sv{flex:1;padding:8px;border-radius:6px;border:1px solid #2a3454;background:#1a2236;font-size:.78rem;font-weight:600}
.pz{background:#1a2236;border:1px solid #2a3454;border-radius:10px;padding:14px;margin-bottom:12px}
.pb{width:100%;padding:12px;border-radius:8px;border:2px dashed #2a3454;background:transparent;color:#f59e0b;font-size:.88rem;font-weight:600}
.pi{width:100%;border-radius:8px;max-height:200px;object-fit:contain;background:#000;margin-top:8px}
.df{display:flex;gap:6px;margin-bottom:8px}
.db{flex:1;padding:7px;border-radius:6px;border:1px solid #2a3454;background:#1a2236;color:#e2e8f0;font-size:.78rem;font-weight:600}
.db.on{background:#f59e0b;color:#000}
.ibtn{background:none;border:1px solid #f59e0b;border-radius:50%;width:30px;height:30px;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-left:8px;color:#f59e0b;font-size:.88rem;font-weight:700}
</style>
</head>
<body>
<div class="hdr">
  <button style="background:none;border:none;color:#e2e8f0;font-size:1.3rem;margin-right:10px" onclick="tglM()">&#9776;</button>
  <div class="title"><h1>VOIDFALL SOLO</h1><small id="hsub"></small></div>
  <div class="sts" id="hsts"></div>
</div>
<div class="mnu" id="mnu">
  <div style="font-weight:700;color:#f59e0b;margin-bottom:8px;font-size:.9rem">Documents de regles</div>
  <a href="https://www.supermeeple.com/wp-content/uploads/2015/02/FR_VOIDFALL-Rules.pdf" target="_blank">Regles FR (PDF)</a>
  <a href="https://www.supermeeple.com/wp-content/uploads/2015/02/FR_VOIDFALL-Compendium.pdf" target="_blank">Compendium FR (PDF)</a>
  <a href="https://mindclashgames.com/wp-content/uploads/2023/09/Voidfall-Official_Errata_Clarifications1.0.pdf" target="_blank">Errata officiel (PDF)</a>
  <a href="https://voidfallapp.mindclashgames.com/" target="_blank">App combat Mindclash</a>
  <div style="display:flex;gap:6px;margin-top:12px" id="cyR"></div>
  <button onclick="tglM()" style="margin-top:10px;width:100%;padding:9px;background:#1a2236;border:1px solid #2a3454;border-radius:8px;color:#94a3b8;font-size:.84rem">Fermer</button>
</div>
<div class="mbg" id="mbg" onclick="clM()"><div class="mdl" onclick="event.stopPropagation()"><button onclick="clM()" style="float:right;background:none;border:none;color:#94a3b8;font-size:1.3rem;padding:4px">&#10005;</button><div style="font-size:.92rem;font-weight:700;color:#f59e0b;margin-bottom:12px">Quoi photographier ?</div><p id="mtxt" style="font-size:.84rem;line-height:1.7;white-space:pre-line"></p></div></div>
<div class="ct" id="ct"></div>
<div class="tabs">
  <button class="tab on" data-t="guide" onclick="stab('guide')">Guide</button>
  <button class="tab" data-t="crise" onclick="stab('crise')">Crise</button>
  <button class="tab" data-t="combat" onclick="stab('combat')">Combat</button>
  <button class="tab" data-t="score" onclick="stab('score')">Score</button>
</div>
<script>
var S={tab:"guide",cy:1,rn:1,ph:"focus",si:0,cats:0,prm:0,grd:0,iCo:3,iDe:0,iCu:0,dN:3,dSD:0,cr:null,scB:60,scRi:0,scHa:0,scCa:0,scGr:0,scCo:0,scPr:0,scFa:0,scCr:0,scPo:0,pI:0};
var curPic=null;

var ST=[
{t:"0. Reveler Crise",d:"Situation : piochez Crise du niveau.\nGuerre : ignorez cette etape.",p:1,i:"La carte Alerte est sur la pioche Alerte : SITUATION (I/II/III) ou GUERRE.\n\nSi Situation : piochez une carte Crise du niveau correspondant. Carte rectangulaire, fond sombre, titre, deux rangees d'icones (militaire haut, economique bas).\n\nPhotographiez les deux cartes ensemble : l'Alerte ET la Crise piochee."},
{t:"1. Selection",d:"Choisissez un Focus de votre main.\nOption : retournez jeton Commerce, jouez Programme assorti.",p:1,i:"Carte Focus = carte de votre main avec 3 actions (icones a gauche). Vous en choisirez 2.\n\nProgramme = carte avec icone Focus correspondante en haut a droite.\n\nPhotographiez la carte Focus choisie et le Programme si joue."},
{t:"2. Actions",d:"Resolvez 2 des 3 actions du Focus (+ Programme).\nVous pouvez resoudre des Crises pendant vos actions.",p:1,i:"Photographiez une vue d'ensemble : vos secteurs controles, flottes, pistes Civilisation, ressources.\n\nPlus c'est large et lisible, meilleur sera le conseil."},
{t:"3. Nettoyage",d:"Max 2 jetons Flotte par secteur (rappeler cubes).\nMax 4 jetons Gloire.\nPlacer/remplacer Programme joue sur fiche Maison.",p:0,i:""},
{t:"4. Progression Neant",d:"Guerre : resoudre plateau Crise (Escarmouche + cout eco) OU poser Catastrophe.\nSituation : pousser toutes les Crises d'un cran vers la droite.",p:1,i:"Plateau Crise = rectangle a 2 rangees de slots.\nHaut = militaire (bonus Escarmouche).\nBas = economique (cout ressources).\nCartes glissent gauche vers droite. Depasse dernier slot = Catastrophe.\n\nPhotographiez le plateau complet avec les cartes dessus."}
];
var EV=[
{t:"1. Contre-Attaque Neant",d:"Escarmouche (rangee militaire) + cout ressources (rangee eco).\n-3 Influence par ressource manquante.",p:1,i:"Photographiez le plateau Crise complet ET vos ressources visibles (Nourriture, Materiel, Energie, Credits)."},
{t:"2. Entretien",d:"Payez : 1 Nourriture OU 2 Materiel/Energie par unite.\n-3 Influence par manque.",p:0,i:""},
{t:"3. Objectifs Galactiques",d:"Evaluez partie droite de l'Evenement Galactique.\nLigne rouge = choisir un seul. Ligne verte = les deux.",p:1,i:"Evenement Galactique = grande carte pres du plateau central.\nPartie droite = objectifs de scoring.\nRouge = un seul objectif. Vert = les deux.\n\nPhotographiez la carte entiere."},
{t:"4. Objectifs Programme",d:"Scorez les Programmes Purs (sans Corruption dessus).",p:1,i:"Programmes = cartes placees sur votre fiche Maison (slots du bas).\nPur = aucun jeton Corruption dessus.\n\nPhotographiez la fiche Maison avec Programmes visibles."},
{t:"5. Recuperer Focus",d:"Reprenez tous vos Focus defausses en main.\nCycle 1 : reprenez aussi le Focus Innovation.",p:0,i:""}
];

function gs(){return S.ph==="eval"?EV:ST;}
function gc(){var s=gs();return s[S.si]||s[0];}
function sv(){try{localStorage.setItem("vf2",JSON.stringify(S));smsg("Partie sauvegardee !");}catch(e){smsg("Erreur");}}
function ld(){try{var d=localStorage.getItem("vf2");if(d){S=JSON.parse(d);R();smsg("Partie chargee !");}}catch(e){}}
function rs(){if(confirm("Reinitialiser la partie ?")){localStorage.removeItem("vf2");S={tab:"guide",cy:1,rn:1,ph:"focus",si:0,cats:0,prm:0,grd:0,iCo:3,iDe:0,iCu:0,dN:3,dSD:0,cr:null,scB:60,scRi:0,scHa:0,scCa:0,scGr:0,scCo:0,scPr:0,scFa:0,scCr:0,scPo:0,pI:0};R();smsg("Reset !");}}
var smt;function smsg(t){var e=document.getElementById("sm");if(e){e.textContent=t;e.style.display="block";clearTimeout(smt);smt=setTimeout(function(){e.style.display="none";},2000);}}
function tglM(){var m=document.getElementById("mnu");m.style.display=m.style.display==="none"?"block":"none";}
function clM(){document.getElementById("mbg").style.display="none";}
function opI(){var s=gc();if(s.i){document.getElementById("mtxt").textContent=s.i;document.getElementById("mbg").style.display="flex";}}
function stab(t){S.tab=t;document.querySelectorAll(".tab").forEach(function(b){b.classList.toggle("on",b.dataset.t===t);});R();}
function nx(){curPic=null;S.si++;var s=gs();if(S.si>=s.length){if(S.ph==="focus"){S.ph="eval";S.si=0;}else{if(S.cy<3)S.cy++;S.rn=1;S.ph="focus";S.si=0;}}R();}
function pv(){if(S.si>0){S.si--;curPic=null;R();}}
function nR(){S.rn++;S.ph="focus";S.si=0;curPic=null;R();}
function ci(k){S[k]++;R();}
function cd(k){if(S[k]>0)S[k]--;R();}
function ct(id,lb,v){return '<div class="ctr"><span>'+lb+'</span><div style="display:flex;align-items:center;gap:5px"><button class="cb" onclick="cd(\''+id+'\')">-</button><span class="cv">'+v+'</span><button class="cb" onclick="ci(\''+id+'\')">+</button></div></div>';}

function cbt(){
  var ic=S.iCo,id=S.iDe,iu=S.iCu,dn=S.dN,sd=S.dSD,lg=[];
  function tp(){return ic+id+iu;}
  function rm(n){var r=n,a=Math.min(ic,r);ic-=a;r-=a;var b=Math.min(id,r);id-=b;r-=b;iu-=Math.min(iu,r);}
  if(!tp()){S.cr={w:"d",x:"Aucune flotte",l:[]};R();return;}
  if(!dn){S.cr={w:"i",x:"Neant 0 PN = defaite auto (errata)",l:[]};R();return;}
  var net=Math.max(0,sd-iu);
  if(net>0){rm(net);lg.push("Approche: "+sd+" deg - "+iu+" abs = "+net+" nets");}
  if(!tp()){S.cr={w:"d",x:"Elimine a l'Approche",l:lg};R();return;}
  var sU=0;
  for(var r=1;r<=20&&tp()>0&&dn>0;r++){
    var iI=ic+id+iu*2,dI=dn,iD=tp()+(r===1?id:0),dD=dn,iA=sU?0:iu;
    if(iI>dI){dn=Math.max(0,dn-iD);if(dn>0){var n1=Math.max(0,dn-iA);if(iA)sU=1;rm(n1);}}
    else if(dI>iI){var n2=Math.max(0,dD-iA);if(iA)sU=1;rm(n2);if(tp()>0)dn=Math.max(0,dn-(tp()+(r===1?id:0)));}
    else{var n3=Math.max(0,dD-iA);if(iA)sU=1;rm(n3);dn=Math.max(0,dn-iD);}
    lg.push("Salve "+r+": Env "+tp()+" | Def "+dn);
  }
  if(tp()>0&&dn<=0)S.cr={w:"i",x:tp()+" cubes survivants",l:lg};
  else if(dn>0)S.cr={w:"d",x:"Neant: "+dn+" cubes",l:lg};
  else S.cr={w:"d",x:"Egalite = Defenseur gagne",l:lg};
  R();
}

function onP(e){var f=e.target.files&&e.target.files[0];if(!f)return;var r=new FileReader();r.onload=function(){curPic=r.result;var p=document.getElementById("pp");if(p)p.innerHTML='<img class="pi" src="'+r.result+'">';var b=document.getElementById("pbtn");if(b)b.textContent="Reprendre photo";};r.readAsDataURL(f);}

function R(){
  document.getElementById("hsub").textContent="Cycle "+S.cy+" - Manche "+S.rn+" - "+(S.ph==="eval"?"Eval":"Focus");
  var h=document.getElementById("hsts");h.innerHTML=S.cats+"/4 cata<br>"+S.prm+" crises";h.style.color=S.cats>=3?"#ef4444":"#94a3b8";
  var c=document.getElementById("ct"),o="";

  if(S.tab==="guide"){
    var ss=gs(),s=gc();
    o+='<div class="svb"><button class="sv" style="color:#f59e0b" onclick="sv()">Sauvegarder</button><button class="sv" style="color:#3b82f6" onclick="ld()">Charger</button><button class="sv" style="color:#94a3b8" onclick="rs()">Reset</button></div>';
    o+='<div id="sm" class="svm" style="font-size:.75rem;color:#22c55e;text-align:center;margin-bottom:8px;display:none"></div>';
    o+='<div class="bar">';for(var i=0;i<ss.length;i++)o+='<div class="pip'+(i<=S.si?" on":"")+'"></div>';o+='</div>';
    o+='<div style="font-size:.7rem;color:#94a3b8;text-transform:uppercase;margin-bottom:4px;letter-spacing:.04em">'+(S.ph==="eval"?"Phase Evaluation":"Phase Focus")+'</div>';
    o+='<div class="c"><div style="display:flex;justify-content:space-between;align-items:flex-start"><div style="font-size:.95rem;font-weight:700;color:#f59e0b;margin-bottom:6px;flex:1">'+s.t+'</div>';
    if(s.i)o+='<button class="ibtn" onclick="opI()">i</button>';
    o+='</div><div style="font-size:.84rem;white-space:pre-line;line-height:1.6">'+s.d+'</div></div>';
    if(s.p){
      o+='<div class="pz"><input type="file" accept="image/*" capture="environment" id="pi" onchange="onP(event)" style="display:none">';
      o+='<button class="pb" id="pbtn" onclick="document.getElementById(\'pi\').click()">'+(curPic?"Reprendre photo":"Prendre photo")+'</button>';
      o+='<div id="pp">'+(curPic?'<img class="pi" src="'+curPic+'">':'')+'</div></div>';
    }
    o+='<div class="nr"><button class="bp" onclick="pv()"'+(S.si===0?" disabled":"")+'>Prec</button>';
    o+='<button class="bn" onclick="nx()">'+(S.si===ss.length-1?(S.ph==="focus"?"Evaluation &rarr;":"Fin cycle &rarr;"):"Suivant &rarr;")+'</button></div>';
    if(S.ph==="focus"&&S.si===ss.length-1)o+='<button class="br" onclick="nR()">&#8635; Manche '+(S.rn+1)+' (rester en Focus)</button>';
  }
  else if(S.tab==="crise"){
    o+='<div style="font-size:1rem;font-weight:700;color:#f59e0b;margin-bottom:10px">Plateau Crise</div>';
    o+='<div class="c">'+ct("prm","Crises permanentes",S.prm)+ct("cats","Catastrophes",S.cats)+ct("grd","Gardiens (plateau central)",S.grd)+'</div>';
    if(S.cats>=3)o+='<div style="background:rgba(239,68,68,.15);border:1px solid #ef4444;border-radius:8px;padding:10px;margin-bottom:10px;font-size:.88rem;color:#ef4444;font-weight:700">'+(S.cats>=4?"DEFAITE IMMEDIATE ! 4 Catastrophes !":"DANGER CRITIQUE : "+S.cats+"/4 Catastrophes !")+'</div>';
    var imp=S.cats*20+S.prm*5+S.grd*10;
    o+='<div class="c"><div style="font-size:.84rem;color:#94a3b8;line-height:1.8">Catastrophes : <strong style="color:#ef4444">'+S.cats+' &times; 20 = '+(S.cats*20)+'</strong><br>Crises perm : <strong style="color:#f97316">'+S.prm+' &times; 5 = '+(S.prm*5)+'</strong><br>Gardiens : <strong>'+S.grd+' &times; 10 = '+(S.grd*10)+'</strong><br><span style="border-top:1px solid #2a3454;display:block;padding-top:6px;margin-top:6px;font-weight:700;color:#f59e0b">Total : '+imp+' Influence Neant</span></div></div>';
    o+='<div style="background:#1a2236;border-radius:8px;padding:10px;font-size:.78rem;color:#94a3b8;line-height:1.6"><strong style="color:#e2e8f0">Rappels :</strong><br>Catastrophe = retirer 1 Corruption OU gagner 5 ressources<br>4 Catastrophes = defaite immediate<br>Crises perm = 5 Inf Neant chacune en fin de partie</div>';
  }
  else if(S.tab==="combat"){
    o+='<div style="font-size:1rem;font-weight:700;color:#f59e0b;margin-bottom:10px">Combat</div>';
    o+='<div class="c" style="border-left:3px solid #f97316"><div style="font-size:.88rem;font-weight:700;color:#f97316;margin-bottom:6px">Envahisseur (Joueur)</div>'+ct("iCo","Corvettes",S.iCo)+ct("iDe","Destroyers",S.iDe)+ct("iCu","Cuirasses",S.iCu)+'</div>';
    o+='<div class="c" style="border-left:3px solid #3b82f6"><div style="font-size:.88rem;font-weight:700;color:#3b82f6;margin-bottom:6px">Defenseur (Neant)</div>'+ct("dN","PN Neant",S.dN)+ct("dSD","Def Secteur",S.dSD)+'</div>';
    o+='<button style="width:100%;padding:12px;border-radius:8px;border:none;background:linear-gradient(135deg,#f97316,#ef4444);color:#fff;font-size:.92rem;font-weight:700;margin-bottom:10px" onclick="cbt()">&#9876; Calculer le combat</button>';
    if(S.cr){var w=S.cr.w==="i";o+='<div class="c" style="border-color:'+(w?"#f97316":"#3b82f6")+'"><div style="text-align:center;font-size:1rem;font-weight:700;color:'+(w?"#f97316":"#3b82f6")+';margin-bottom:6px">'+(w?"&#9876; Victoire Envahisseur":"&#128737; Victoire Defenseur")+'</div><div style="text-align:center;font-size:.84rem;color:#94a3b8;margin-bottom:8px">'+S.cr.x+'</div><div style="font-size:.74rem;font-family:monospace;color:#94a3b8">';for(var i=0;i<S.cr.l.length;i++)o+='<div>'+S.cr.l[i]+'</div>';o+='</div></div>';}
  }
  else if(S.tab==="score"){
    var vb=S.scB+S.scRi*30+S.scHa*20+S.scCa*20+S.scGr*10+S.scCo*5+S.scPr*5+S.scFa*3+S.scCr*2+S.scPo;
    o+='<div style="font-size:1rem;font-weight:700;color:#f59e0b;margin-bottom:10px">Score Final</div>';
    o+='<div class="c"><div style="font-size:.82rem;font-weight:700;color:#ef4444;margin-bottom:8px">Score du Neant</div>';
    o+='<div class="df"><button class="db'+(S.scB===60?" on":"")+'" onclick="S.scB=60;R()">Facile (60)</button><button class="db'+(S.scB===100?" on":"")+'" onclick="S.scB=100;R()">Moyen (100)</button><button class="db'+(S.scB===140?" on":"")+'" onclick="S.scB=140;R()">Diff (140)</button></div>';
    o+=ct("scRi","Failles (&times;30)",S.scRi)+ct("scHa","Refuges incomplets (&times;20)",S.scHa)+ct("scCa","Catastrophes (&times;20)",S.scCa)+ct("scGr","Gardiens centraux (&times;10)",S.scGr)+ct("scCo","Techs Consumees (&times;5)",S.scCo)+ct("scPr","Crises permanentes (&times;5)",S.scPr)+ct("scFa","Maisons Dechues (&times;3)",S.scFa)+ct("scCr","Corruptions (&times;2)",S.scCr)+ct("scPo","Population Neant (&times;1)",S.scPo)+'</div>';
    o+='<div class="c" style="border-color:#ef4444;text-align:center"><div style="font-size:.8rem;color:#94a3b8">Score du Neant</div><div style="font-size:2.2rem;font-weight:700;color:#ef4444">'+vb+'</div></div>';
    o+='<div class="c"><div style="font-size:.85rem;font-weight:700;color:#22c55e;margin-bottom:6px">Votre Influence</div>'+ct("pI","Total Influence",S.pI)+'</div>';
